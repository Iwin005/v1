<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Login &mdash; Win Bus Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <!-- Firebase compat SDKs removed; using modern ES modules in script block below -->
  <link rel="stylesheet" href="index.css" />
  <style>
    body {
      background: var(--bg-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
    }

    .login-card {
      background: var(--surface-white);
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      padding: var(--space-3xl) var(--space-2xl);
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-soft);
      position: relative;
      z-index: 1;
    }
    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--brand-yellow), var(--brand-gold));
      border-radius: 28px 28px 0 0;
    }

    .login-logo {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }
    .login-logo .bus-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--brand-yellow) 0%, var(--brand-yellow-soft) 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-dark);
      margin-bottom: var(--space-md);
      box-shadow: 0 4px 12px rgba(255, 193, 7, 0.25);
    }
    .login-logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
    }
    .login-logo h1 span { color: var(--brand-gold); }
    .login-logo p {
      font-size: var(--font-body);
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-title {
      font-size: var(--font-meta);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: var(--space-xl);
      text-align: center;
    }

    .form-group {
      margin-bottom: var(--space-lg);
    }
    .form-group label {
      display: block;
      font-size: var(--font-meta);
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      color: var(--brand-gold);
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      height: 48px;
      background: var(--surface-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 40px 0 38px;
      font-size: var(--font-body);
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }
    .input-wrap input:focus {
      border-color: var(--brand-yellow);
      box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.15);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: var(--transition);
    }
    .toggle-pw:hover { color: var(--brand-gold); }

    .btn-login {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, var(--brand-yellow) 0%, var(--brand-yellow-soft) 100%);
      color: var(--text-dark);
      border: none;
      border-radius: 12px;
      font-size: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(255, 193, 7, 0.25);
    }
    .btn-login:hover  {
      background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-yellow) 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 193, 7, 0.4);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .error-msg {
      background: var(--danger-light);
      border: 1px solid var(--border);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: var(--space-md) var(--space-lg);
      font-size: var(--font-meta);
      margin-top: var(--space-lg);
      display: none;
      align-items: center;
      gap: var(--space-sm);
    }
    .error-msg.show { display: flex; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-xl);
      color: var(--text-muted);
      font-size: var(--font-body);
      text-decoration: none;
      transition: var(--transition);
    }
    .back-link:hover { color: var(--brand-gold); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Initializing loader - prevents flicker */
    .init-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .init-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .init-loader-content {
      text-align: center;
    }
    .init-loader .bus-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      margin-bottom: 16px;
      box-shadow: var(--shadow-md);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    .init-loader p {
      color: var(--text-muted);
      font-size: var(--font-body);
    }

    .login-card {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .login-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Initializing Loader -->
  <div class="init-loader" id="initLoader">
    <div class="init-loader-content">
      <div class="bus-icon">&#x1F68C;</div>
      <p id="initStatus">Connecting to server...</p>
    </div>
  </div>

  <div class="login-card" id="loginCard">

    <div class="login-logo">
      <div class="bus-icon">&#x1F68C;</div>
      <h1>Win<span>Bus</span> Tracker</h1>
      <p>Partner &amp; Agent Portal</p>
    </div>

    <div class="login-title">
      <i class="fa-solid fa-shield-halved" style="margin-right:6px;color:#fbc02d"></i>
      Secure Login
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input id="email" type="email" placeholder="agent@winbus.in" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePwBtn" type="button" tabindex="-1">
          <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn">
      <span id="btnText"><i class="fa-solid fa-right-to-bracket"></i> Login</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorText">Invalid credentials. Please try again.</span>
    </div>

    <a href="index.html" class="back-link">
      <i class="fa-solid fa-arrow-left" style="margin-right:5px"></i> Back to Bus Search
    </a>

  </div>

  <script type="module">
    // Import modern Firebase Modular SDK (v10/v11/v12+) functions
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      setPersistence, 
      browserLocalPersistence,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ==========================================
    // Firebase Configuration Section
    // Paste your Firebase Web App credentials here
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCZXryu-NQ-Jv4hRRPCnmc8shKgLQPQP94",
      authDomain: "realtime-tracking-3809e.firebaseapp.com",
      databaseURL: "https://realtime-tracking-3809e-default-rtdb.firebaseio.com",
      projectId: "realtime-tracking-3809e",
      storageBucket: "realtime-tracking-3809e.firebasestorage.app",
      messagingSenderId: "1085653591220",
      appId: "1:1085653591220:web:5789826b047764c2ada3e1",
      measurementId: "G-HT2HGW1RVE"
    };

    // Validate Firebase Config
    const isValidConfig = firebaseConfig.apiKey && 
                          firebaseConfig.apiKey !== 'YOUR_API_KEY' &&
                          firebaseConfig.authDomain &&
                          firebaseConfig.projectId;
    
    if (!isValidConfig) {
      console.error('Invalid Firebase configuration!');
      document.body.innerHTML = '<div style="padding: 40px; text-align: center; color: white;"><h2>Configuration Error</h2><p>Firebase is not properly configured. Please check your firebaseConfig.</p></div>';
      throw new Error('Invalid Firebase config');
    }

    // Initialize Firebase Services
    console.log("Firebase Project:", firebaseConfig.projectId);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Elements
    const initLoader = document.getElementById('initLoader');
    const loginCard = document.getElementById('loginCard');
    const initStatus = document.getElementById('initStatus');
    
    // Update status
    initStatus.textContent = 'Checking authentication...';
    
    // Auth guard - prevent redirect loops
    let authInitialized = false;
    let redirecting = false;

    // Wait for Firebase auth restoration
    onAuthStateChanged(auth, (user) => {
      console.log("Auth callback:", user?.uid || null);
      
      // Prevent duplicate handling
      if (authInitialized) return;
      authInitialized = true;

      if (user) {
        // User is logged in - redirect ONCE to dashboard
        if (!redirecting) {
          redirecting = true;
          console.log("Redirecting to dashboard");
          window.location.replace("dashboard.html");
        }
        return;
      }

      // User is not logged in - show login form
      console.log("Showing login form");
      initLoader.classList.add('hidden');
      loginCard.classList.add('visible');
    });

    // Reference all UI elements using requested IDs
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const togglePwBtn = document.getElementById('togglePwBtn');
    const eyeIcon = document.getElementById('eyeIcon');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    // Password visibility toggle (show/hide)
    togglePwBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fa-solid fa-eye-slash'; // FontAwesome eye-slash icon
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'fa-solid fa-eye'; // FontAwesome eye icon
      }
    });

    // Toggle button loading states (enable/disable button, hide/show spinner)
    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      btnText.style.display = isLoading ? 'none' : 'flex';
      spinner.style.display = isLoading ? 'block' : 'none';
    }

    // Display error message in the existing styled alert box
    function showError(message) {
      errorText.textContent = message;
      errorMsg.classList.add('show');
    }

    // Core Firebase Email & Password Sign-In function
    async function doLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Hide error box from previous attempt
      errorMsg.classList.remove('show');

      // Simple client-side validation
      if (!email) { showError('Please enter your email address.'); return; }
      if (!password) { showError('Please enter your password.'); return; }

      setLoading(true);

      try {
        console.log('Starting login...');
        
        // Step 1: Set persistent local storage session
        await setPersistence(auth, browserLocalPersistence);
        console.log('Persistence set');
        
        // Step 2: Sign in using Firebase Authentication SDK
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        console.log('Login successful:', userCredential.user.email);
        
        // Step 3: Set quick local login flag and redirect to dashboard
        localStorage.setItem('win_bus_logged_in', 'true');
        setLoading(false);
        
        // Always redirect on successful login
        console.log('Redirecting to dashboard...');
        window.location.replace('dashboard.html');
        
      } catch (error) {
        setLoading(false);
        console.error("Firebase Auth Error:", error);

        // Step 4: Map Firebase Auth error codes to user-friendly messages
        let errorMessage = '';
        
        switch (error.code) {
          case 'auth/invalid-credential':
          case 'auth/user-not-found':
          case 'auth/wrong-password':
            errorMessage = 'Invalid email or password. Please try again.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Please enter a valid email address.';
            break;
          case 'auth/network-request-failed':
            errorMessage = 'Network error. Please check your internet connection.';
            break;
          case 'auth/too-many-requests':
            errorMessage = 'Too many failed attempts. Please try again later.';
            break;
          case 'auth/user-disabled':
            errorMessage = 'This account has been disabled. Contact support.';
            break;
          default:
            // Show actual error for debugging
            errorMessage = `Error: ${error.message || error.code || 'Unknown error'}`;
        }
        
        showError(errorMessage);
      }
    }

    // Attach event listeners
    loginBtn.addEventListener('click', doLogin);

    // Allow users to submit form pressing the 'Enter' key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
