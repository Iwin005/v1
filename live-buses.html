<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg"/>
  <title>Live Fleet Tracking &mdash; Win Bus Tracker</title>
  <meta name="description" content="Real-time multi-bus live tracking map with direct WebSocket streaming."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="stylesheet" href="index.css" />
  <style>
    /* Global Reset - Prevent Overflow */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    
    /* Operations Map Dashboard Styles */
    body, html {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    
    body {
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    nav.app-nav {
      position: relative;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      flex-shrink: 0;
    }

    #map {
      flex: 1;
      min-height: 0;
      width: 100%;
      z-index: 1;
    }

    /* Floating Left Sidebar Pane - Desktop */
    .sidebar {
      position: absolute;
      left: 20px;
      top: 84px;
      bottom: 20px;
      width: 360px;
      max-width: calc(100% - 40px);
      background: var(--surface-white);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transition: transform 0.3s ease;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--brand-yellow), var(--brand-gold));
      z-index: 2;
    }

    .sidebar-header {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--border);
      position: relative;
      background: var(--surface-soft);
      cursor: default;
    }
    
    @media (max-width: 768px) {
      .sidebar-header {
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      
      .sidebar-header:active {
        background: rgba(0, 0, 0, 0.02);
      }
    }

    .sidebar-header h2 {
      font-size: var(--font-m);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .sidebar-header h2 i {
      color: var(--accent);
    }

    .sidebar-header p {
      font-size: var(--font-meta);
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    /* Sidebar toggle - hidden on desktop */
    .sidebar-toggle {
      display: none;
    }
    
    /* Route list and items */
    .route-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--space-md);
    }
    
    .route-item {
      padding: 12px var(--space-md);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background-color 0.2s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .route-item:hover {
      background-color: var(--surface-soft);
    }
    
    .route-item:last-child {
      border-bottom: none;
    }
    
    .route-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      line-height: 1.4;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: normal;
      flex: 1;
      min-width: 0;
    }
    
    .route-meta {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Search Filters - Constrained width */
    .search-filters {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      background: var(--surface-soft);
      width: 100%;
      box-sizing: border-box;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--surface-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: var(--transition);
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-width: 0;
    }

    .filter-group:focus-within {
      border-color: var(--brand-yellow);
      box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.15);
    }

    .filter-group i {
      color: var(--brand-gold);
      font-size: 14px;
      flex-shrink: 0;
    }

    .filter-group select,
    .filter-group input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: var(--font-body);
      color: var(--text-primary);
      outline: none;
      font-family: inherit;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      text-overflow: ellipsis;
    }
    
    /* Route dropdown - constrain width */
    #routeFilter {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    
    /* Route options text wrapping */
    #routeFilter option {
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    /* Bus List Items */
    .bus-list {
      flex-grow: 1;
      overflow-y: auto;
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      background: var(--surface-white);
    }

    .bus-item {
      background: var(--surface-card);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: var(--space-lg);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      text-align: left;
    }

    .bus-item:hover {
      border-color: var(--brand-yellow);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 193, 7, 0.15);
      background: var(--surface-white);
    }

    .bus-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bus-item-op {
      font-weight: 700;
      font-size: var(--font-body);
      color: var(--primary);
    }

    .bus-item-route {
      font-size: var(--font-meta);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .bus-item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--font-meta);
      color: var(--text-muted);
      padding-top: var(--space-sm);
      border-top: 1px dashed var(--border);
    }

    .bus-item-type {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-size: 10px;
    }

    /* Bus Statuses */
    .bus-status {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .bus-status.live {
      background: var(--success-light);
      color: var(--success);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse-live 1.5s infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .bus-status.offline {
      background: var(--bg-main);
      color: var(--text-muted);
    }

    /* Intermediate stops dropdown inside cards */
    .bus-stops {
      margin-top: var(--space-xs);
    }

    .stops-toggle {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: var(--font-meta);
      color: var(--accent);
      cursor: pointer;
    }

    .stops-list {
      margin-top: var(--space-xs);
      padding: var(--space-sm);
      background: var(--bg-main);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .stop-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) 0;
      font-size: 11px;
    }

    .stop-number {
      width: 16px;
      height: 16px;
      background: var(--accent);
      color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
    }

    .stop-name {
      flex: 1;
      color: var(--text-muted);
    }

    .stop-time {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-3xl) var(--space-lg);
      color: var(--text-muted);
      flex-grow: 1;
    }

    .empty-state i {
      font-size: var(--font-xl);
      color: var(--border);
      margin-bottom: var(--space-lg);
    }

    /* Leaflet popup styling */
    .leaflet-popup-content-wrapper {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow-lg) !important;
      border: 1px solid var(--border);
      min-width: 180px !important;
    }

    .leaflet-popup-content {
      margin: 8px 12px !important;
      line-height: 1.4 !important;
    }

    .leaflet-popup-content p {
      margin: 4px 0 !important;
    }

    .popup-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .popup-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ============================================================
       MOBILE BREAKPOINT (< 768px) - Collapsible Bottom Sheet
       ============================================================ */
    @media (max-width: 768px) {
      /* Header mobile adjustments */
      nav.app-nav {
        min-height: 56px;
        padding: 0 12px;
      }
      
      /* Map responsive height - fluid */
      #map {
        height: 100%;
        min-height: 0;
      }
      
      /* Sidebar becomes collapsible bottom sheet touching viewport bottom */
      .sidebar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        width: 100%;
        max-width: none;
        height: 60vh;
        max-height: 80vh;
        border-radius: 24px 24px 0 0;
        z-index: 1000;
        transform: translateY(calc(100% - 180px));
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.15);
      }
      
      .sidebar.expanded {
        transform: translateY(0);
      }
      
      /* Bottom sheet handle visual indicator */
      .sidebar::after {
        content: "";
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 36px;
        height: 4px;
        background: #cbd5e1;
        border-radius: 2px;
        z-index: 1010;
      }
      
      .sidebar-header {
        height: 64px;
        padding: 10px 16px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        background: var(--surface-soft);
        position: relative;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      .sidebar-header:active {
        background: rgba(0, 0, 0, 0.02);
      }
      
      .sidebar-header h2 {
        font-size: 16px;
        margin: 0;
        margin-right: 40px;
      }
      
      .sidebar-header p {
        font-size: 11px;
        margin: 4px 0 0 0;
        margin-right: 40px;
      }
      
      /* Expand/collapse indicator */
      .sidebar-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--surface-soft);
        color: var(--text-muted);
        font-size: 14px;
        transition: transform 0.3s ease;
      }
      
      .sidebar.expanded .sidebar-toggle {
        transform: translateY(-50%) rotate(180deg);
      }
      
      /* Route items - ensure text wraps */
      .route-item {
        padding: 14px 16px;
        min-height: 44px;
      }
      
      .route-name {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
        overflow-wrap: anywhere;
        white-space: normal;
        flex: 1;
        min-width: 0;
      }
      
      .route-meta {
        font-size: 12px;
        white-space: nowrap;
      }
      
      /* Leaflet controls reposition */
      .leaflet-control-zoom {
        margin-top: 20px !important;
        margin-right: 10px !important;
      }
      
      .leaflet-control-layers {
        margin-right: 10px !important;
      }

      /* Make active buses list fill bottom sheet and scroll */
      .bus-list {
        max-height: none;
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .search-filters {
        padding: 12px 16px !important;
        gap: 8px !important;
        background: #ffffff !important;
        border-bottom: 1px solid var(--border-soft) !important;
      }

      .filter-group {
        padding: 8px 12px !important;
        border-radius: 10px !important;
        background: #f8fafc !important;
      }
    }
    
    /* Tablet breakpoint */
    @media (min-width: 769px) and (max-width: 1024px) {
      #map {
        height: 100%;
      }
      
      .sidebar {
        width: 320px;
        left: 16px;
        top: 76px;
        bottom: 16px;
      }
    }
    
    /* Desktop breakpoint */
    @media (min-width: 1025px) {
      #map {
        height: 100%;
        min-height: 0;
      }
    }

    .status.live {
        color: #16a34a;
        font-weight: 600;
    }

    .status.connecting {
        color: #f59e0b;
        font-weight: 600;
    }

    .status.offline {
        color: #ef4444;
        font-weight: 600;
    }

    /* Mobile Navigation Styles */
    .mobile-menu-btn {
      display: none !important;
    }
    .mobile-nav-overlay,
    .mobile-nav-drawer {
      display: none !important;
    }

    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex !important;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        color: #d84e55;
        margin-left: var(--space-sm);
      }
      .mobile-menu-btn:active {
        transform: scale(0.95);
      }
      .mobile-nav-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 10000;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .mobile-nav-overlay.active {
        display: block !important;
        opacity: 1;
      }
      .mobile-nav-drawer {
        display: flex !important;
        position: fixed;
        top: 0;
        left: 0;
        right: auto;
        width: 80vw;
        max-width: 300px;
        height: 100vh;
        background: #ffffff;
        z-index: 10001;
        box-shadow: 8px 0 30px rgba(0, 0, 0, 0.25);
        transform: translate3d(-100%, 0, 0);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        flex-direction: column;
        will-change: transform;
      }
      .mobile-nav-drawer.active {
        transform: translate3d(0, 0, 0);
      }
      .mobile-nav-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-lg) var(--space-md);
        background: linear-gradient(135deg, #d84e55 0%, #c73e4c 100%);
        color: #ffffff;
        flex-shrink: 0;
      }
      .mobile-nav-brand {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        font-weight: 700;
        font-size: 16px;
      }
      .mobile-nav-brand i {
        font-size: 22px;
      }
      .mobile-nav-close {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.15);
        border: none;
        border-radius: 10px;
        color: #ffffff;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s ease;
        min-width: 44px;
        min-height: 44px;
      }
      .mobile-nav-close:hover,
      .mobile-nav-close:active {
        background: rgba(255, 255, 255, 0.25);
      }
      .mobile-nav-links {
        padding: var(--space-md);
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
        overflow-y: auto;
        flex: 1;
      }
      .mobile-nav-link {
        display: flex;
        align-items: center;
        gap: var(--space-md);
        padding: var(--space-md);
        color: #334155;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        border-radius: 12px;
        transition: all 0.2s ease;
        min-height: 48px;
      }
      .mobile-nav-link i {
        width: 28px;
        text-align: center;
        color: #d84e55;
        font-size: 18px;
        flex-shrink: 0;
      }
      .mobile-nav-link span {
        flex: 1;
      }
      .mobile-nav-link:hover,
      .mobile-nav-link.active {
        background: #fff5f5;
        color: #d84e55;
      }
    }

    /* Custom Searchable Dropdown CSS */
    .custom-dropdown-toggle {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      font-size: 15px;
      user-select: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .custom-dropdown-toggle:hover {
      border-color: var(--brand-gold);
    }
    .filter-group .custom-dropdown-toggle {
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      min-height: auto !important;
      box-shadow: none !important;
    }
    .custom-dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 4px;
      box-shadow: var(--shadow-lg);
      z-index: 99999;
      max-height: 250px;
      flex-direction: column;
      overflow: hidden;
      animation: dropdownFadeIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes dropdownFadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dropdown-option {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: normal;
      word-break: break-word;
      color: var(--text-primary);
      transition: background 0.15s;
    }
  </style>
</head>

  <!-- Navbar -->
  <nav class="app-nav">

      <img src="assets/logo.jpg" alt="WinBus Logo" class="brand-logo-img">
      <div>Win<span>Bus</span> Tracker</div>
    </a>
    
    <div class="nav-links">

    </span>

      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
  </nav>

  <!-- Mobile Side Drawer -->
  <div class="mobile-nav-overlay" id="mobileNavOverlay" onclick="closeMobileNav()" aria-hidden="true"></div>
  <div class="mobile-nav-drawer" id="mobileNavDrawer" role="dialog" aria-modal="true" aria-labelledby="mobileNavTitle">
    <div class="mobile-nav-header">
      <div class="mobile-nav-brand" id="mobileNavTitle">
        <img src="assets/logo.jpg" alt="WinBus Logo" class="brand-logo-img" style="height: 32px; width: 32px; border: 1px solid rgba(255,255,255,0.6);">
        <span>WinBus Tracker</span>
      </div>
      <button class="mobile-nav-close" onclick="closeMobileNav()" aria-label="Close navigation menu">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </div>
    <nav class="mobile-nav-links" aria-label="Mobile navigation">
      <a href="index.html" class="mobile-nav-link">
        <i class="fa-solid fa-house" aria-hidden="true"></i>
        <span>Home</span>
      </a>
      <a href="routes.html" class="mobile-nav-link">
        <i class="fa-solid fa-route" aria-hidden="true"></i>
        <span>Routes</span>
      </a>
      <a href="operators.html" class="mobile-nav-link">
        <i class="fa-solid fa-building" aria-hidden="true"></i>
        <span>Operators</span>
      </a>
      <a href="live-buses.html" class="mobile-nav-link active" aria-current="page">
        <i class="fa-solid fa-satellite-dish" aria-hidden="true"></i>
        <span>Live Buses</span>
      </a>
      <a href="agent-login.html" class="mobile-nav-link">
        <i class="fa-solid fa-user-shield" aria-hidden="true"></i>
        <span>Agent Login</span>
      </a>
    </nav>
  </div>

  <!-- Left Sidebar Panel -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="toggleSidebar()">
      <h2><i class="fa-solid fa-satellite-dish"></i> Live Fleet</h2>
      <p id="fleetCount">0 active buses tracking</p>
      <div class="sidebar-toggle">
        <i class="fa-solid fa-chevron-up"></i>
      </div>
    </div>

    <!-- Search Filters -->
    <div class="search-filters">
      <div class="filter-group">
        <i class="fa-solid fa-route"></i>
        <select id="routeFilter" onchange="filterBuses()">
          <option value="">All Routes</option>
        </select>
      </div>
      <div class="filter-group">
        <i class="fa-solid fa-building"></i>
        <input type="text" id="operatorFilter" placeholder="Filter by operator..." onkeyup="filterBuses()">
      </div>
    </div>

    <!-- Active Buses List -->
    <div id="bus-sidebar-list" class="bus-list">
    </div>
  </div>

  <!-- Leaflet Map Container -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    // Initialize Leaflet Map centered on Tamil Nadu
    const map = L.map('map', {
      zoomControl: false // Disable default zoom controls to keep UI clean
    }).setView([11.1271, 78.6569], 7);

    // Zoom controls positioning
    L.control.zoom({ position: 'topright' }).addTo(map);

    // Voyager tile layer (Light theme with clear road view)
    const tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
      crossOrigin: true
    }).addTo(map);

    // Local state variables
    const busMarkers = {}; // Cache for bus markers: { busId: marker }
    const busData = {};    // Current bus data: { busId: { name, route, serviceNo, time, lat, lng, lastSeen, isLive, stopTimes } }
    let trackingInterval = null;

    // Hardcoded metadata for known services
    const BUS_METADATA = {
      "SBM_001": {
        name: "SBM TRANSPORT",
        route: "CHENNAI - TIRUNELVELI",
        time: "10:30 AM",
        stopTimes: [{ name: "KILAMBAKAM", time: "11:20 AM" }]
      },
      "PAL_001": {
        name: "PAL TRANSPORT",
        route: "CHENNAI - MADURAI",
        time: "09:15 PM",
        stopTimes: [{ name: "KILAMBAKAM", time: "10:00 PM" }]
      },
      "KPN_001": {
        name: "KPN TRAVELS",
        route: "CHENNAI - COIMBATORE",
        time: "08:00 PM",
        stopTimes: [{ name: "KILAMBAKAM", time: "09:00 PM" }]
      }
    };

    const API_BASE =
        "https://live-server-production.up.railway.app";

    // Load page and start live tracking immediately
    document.addEventListener("DOMContentLoaded", () => {
      console.log("[BUS RENDER] Initializing live buses map...");
      startLiveTracking();
    });

    // Custom DivIcon creator for Bus Marker
    function createBusIcon(busId, type) {
      const bgStyle = "background:#22c55e;"; // Live green color for active buses
      return L.divIcon({
        className: 'bus-marker-container',
        html: `<div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:16px;${bgStyle}color:#fff;">🚌</div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
    }

    // Start live tracking interval
    function startLiveTracking() {
      const statusBadge = document.getElementById("connection-status");

      if (statusBadge) {
        statusBadge.className = "status connecting";
        statusBadge.textContent = "Connecting";
      }

      // First fetch
      fetchLiveBuses();

      // Poll every 15 seconds
      if (trackingInterval) clearInterval(trackingInterval);
      trackingInterval = setInterval(fetchLiveBuses, 15000);
    }

    async function fetchLiveBuses() {

        const statusElement =
            document.getElementById(
                "connection-status"
            );

        try {

            console.log(
                "[LIVE API] Fetching live buses..."
            );

            // show connecting while request runs
            statusElement.innerText =
                "Connecting";

            statusElement.className =
                "status connecting";

            const response =
                await fetch(
                    `${API_BASE}/api/buses/live`
                );

            const buses =
                await response.json();

            console.log(
                "[LIVE API]",
                buses
            );

            updateMapMarkers(
                buses
            );

            renderBusSidebar(
                buses
            );

            populateRouteFilter(
                buses
            );

            // SUCCESS
            statusElement.innerText =
                "Live Tracking";

            statusElement.className =
                "status live";

        } catch (err) {

            console.error(
                "[LIVE API ERROR]",
                err
            );

            // FAIL
            statusElement.innerText =
                "Offline";

            statusElement.className =
                "status offline";
        }
    }

    // Live tracking is controlled exclusively by DOMContentLoaded and startLiveTracking()

    // Clear all markers and state
    function clearAllMarkers() {
      Object.keys(busMarkers).forEach(busId => {
        map.removeLayer(busMarkers[busId]);
        delete busMarkers[busId];
      });
      Object.keys(busData).forEach(busId => {
        delete busData[busId];
      });
    }

    // Update coordinates and marker on map
    function updateBusMarker(busId, latitude, longitude) {
      const newLatLng = L.latLng(latitude, longitude);

      if (busMarkers[busId]) {
        console.log(`[MARKER UPDATE] Updating position for ${busId} to: ${latitude}, ${longitude}`);
        busMarkers[busId].setLatLng(newLatLng);
        busMarkers[busId].getPopup().setContent(createPopupContent(busId));
      } else {
        console.log(`[MARKER UPDATE] Creating new marker for ${busId} at: ${latitude}, ${longitude}`);
        const marker = L.marker(newLatLng, {
          icon: createBusIcon(busId, "live")
        }).addTo(map);

        marker.bindPopup(createPopupContent(busId));
        busMarkers[busId] = marker;
      }
      
      console.log(`[MAP UPDATE] Marker count: ${Object.keys(busMarkers).length}`);
    }

    // Update in-memory state of buses and map markers
    function updateMapMarkers(liveData) {
      console.log("[BUS RENDER] Updating states from live data...");
      const incomingIds = new Set(Object.keys(liveData || {}));

      // 1. Remove markers and data for buses that are no longer in the live API response
      Object.keys(busData).forEach(busId => {
        if (!incomingIds.has(busId)) {
          console.log(`[BUS RENDER] Bus ${busId} missing from live response. Removing marker.`);
          if (busMarkers[busId]) {
            map.removeLayer(busMarkers[busId]);
            delete busMarkers[busId];
          }
          delete busData[busId];
        }
      });

      // 2. Add or update buses from live response
      incomingIds.forEach(gpsId => {
        const data = liveData[gpsId];
        if (!data || data.lat === null || data.lat === undefined || data.lng === null || data.lng === undefined || isNaN(Number(data.lat)) || isNaN(Number(data.lng))) {
          console.warn(`[BUS RENDER] Skipping bus ${gpsId} due to invalid coordinates:`, data);
          if (busMarkers[gpsId]) {
            map.removeLayer(busMarkers[gpsId]);
            delete busMarkers[gpsId];
          }
          return;
        }
        
        // Retrieve metadata or create dynamic fallback
        const meta = BUS_METADATA[gpsId] || {
          name: gpsId.split('_')[0] + " TRANSPORT",
          route: "DYNAMIC ROUTE",
          time: "Live",
          stopTimes: []
        };

        busData[gpsId] = {
          name: meta.name,
          route: data.route || meta.route,
          serviceNo: gpsId,
          time: data.time || meta.time,
          lat: data.lat,
          lng: data.lng,
          lastSeen: Date.now(),
          isLive: true,
          stopTimes: data.stopTimes || meta.stopTimes || [],
          intermediateStops: data.intermediateStops || [],
          operator: data.operator,
          from: data.from,
          to: data.to,
          departureTime: data.departureTime,
          arrivalTime: data.arrivalTime,
          op: data.op,
          nextStop: data.nextStop || null,
          lastPassedStop: data.lastPassedStop || null
        };

        updateBusMarker(gpsId, data.lat, data.lng);
      });

    }

    // Generate HTML for marker popup card
    function createPopupContent(busId) {
      const liveBus = busData[busId];
      if (!liveBus) return '';
      
      const operatorName = liveBus.op || liveBus.operator || "Unknown Operator";
      const routeText = liveBus.route || "Unknown Route";
      const departureTime = liveBus.time || "--:--";
      const arrivalTime = liveBus.arrivalTime || "--:--";
      
      // Calculate age of update
      const ageSec = Math.max(0, Math.floor((Date.now() - liveBus.lastSeen) / 1000));
      const ageText = ageSec < 60 ? `${ageSec}s ago` : `${Math.floor(ageSec / 60)}m ago`;

      // Filter stops marked to show on card
      const stopsToShow = (liveBus.intermediateStops || liveBus.stopTimes || []).filter(stop => stop.showOnCard === true || stop.showOnCard === "true");
      let stopsHtml = "";
      if (stopsToShow.length > 0) {
          stopsHtml = `
          <div class="bus-card-stops" style="margin-bottom: 12px; padding: 8px 12px; background: #fafafb; border-left: 3px solid #ffc107; font-size: 11px; display: flex; flex-direction: column; gap: 6px; border-radius: 6px; border: 1px solid #e2e8f0; border-top-left-radius: 0; border-bottom-left-radius: 0;">
              ${stopsToShow.map(s => {
                  const stopTime = s.time || s.scheduledTime || "--:--";
                  return `
                  <div style="display: flex; justify-content: space-between; align-items: center;">
                      <span style="font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 4px;">
                          <i class="fa-solid fa-map-pin" style="font-size: 9px; color: #ffc107;"></i> ${s.name}
                      </span>
                      <span style="font-weight: 700; color: #eab308;">${stopTime}</span>
                  </div>
                  `;
              }).join('')}
          </div>
          `;
      }

      return `
<div style="
    min-width: 240px;
    border-radius: 16px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    border: 1px solid #e2e8f0;
">
    <!-- Header with Operator Name and Live Badge -->
    <div style="
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        padding: 12px 16px;
        color: #ffffff;
    ">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
            <span style="
                background: #ffc107;
                color: #0f172a;
                font-size: 9px;
                font-weight: 800;
                text-transform: uppercase;
                padding: 2px 6px;
                border-radius: 50px;
                letter-spacing: 0.5px;
            ">Live</span>
            <span style="font-size: 10px; color: #94a3b8; font-weight: 500;">
                <i class="fa-regular fa-clock"></i> ${ageText}
            </span>
        </div>
        <h3 style="
            font-size: 15px;
            font-weight: 800;
            margin: 0;
            color: #ffffff;
            letter-spacing: -0.3px;
        ">
            🚌 ${operatorName}
        </h3>
        <div style="
            font-size: 10px;
            color: #ffc107;
            font-weight: 700;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        ">
            ${routeText}
        </div>
    </div>

    <!-- Details Body -->
    <div style="padding: 12px 16px;">
        ${stopsHtml}
        
        <!-- Next/Last passed stop display -->
        ${(liveBus.lastPassedStop || liveBus.nextStop) ? `
        <div style="
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #fafafb;
            border-left: 3px solid #6366f1;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        ">
            ${liveBus.lastPassedStop ? `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #475569;">📍 Last Passed:</span>
                <span style="font-weight: 800; color: #1e293b;">${liveBus.lastPassedStop}</span>
            </div>
            ` : ''}
            ${liveBus.nextStop ? `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #475569;">🚏 Next Stop:</span>
                <span style="font-weight: 800; color: #10b981;">${liveBus.nextStop}</span>
            </div>
            ` : ''}
        </div>
        ` : ''}

        <!-- Departure and Arrival Row -->
        <div style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #f1f5f9;
        ">
            <div style="text-align: left;">
                <span style="font-size: 8px; color: #64748b; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 1px;">Departure</span>
                <strong style="font-size: 13px; color: #0f172a; font-weight: 800;">${departureTime}</strong>
            </div>
            <div style="color: #ffc107; font-size: 16px; font-weight: 800; transform: translateY(-2px);">&rarr;</div>
            <div style="text-align: right;">
                <span style="font-size: 8px; color: #64748b; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 1px;">Arrival</span>
                <strong style="font-size: 13px; color: #0f172a; font-weight: 800;">${arrivalTime}</strong>
            </div>
        </div>
    </div>
</div>
`;
    }

    // Focus camera on selected bus
    function focusOnBus(busId) {
      console.log(`[MAP UPDATE] Focusing on bus: ${busId}`);
      if (busMarkers[busId]) {
        const marker = busMarkers[busId];
        map.setView(marker.getLatLng(), 14, { animate: true });
        marker.openPopup();
        
        const mapEl = document.getElementById('map');
        if (mapEl) {
          mapEl.focus();
        }
      } else {
        console.warn(`[MAP UPDATE] Marker not found for ${busId} to focus`);
      }
    }

    function populateRouteFilter(buses) {
        const routeSelect = document.getElementById("routeFilter");

        // Get unique route names from buses
        const uniqueRoutes = [
            ...new Set(
                Object.values(buses)
                    .map(bus => bus.route)
                    .filter(Boolean)
            )
        ];

        routeSelect.innerHTML = `
        <option value="">All Routes</option>
        `;

        uniqueRoutes.forEach(route => {
            routeSelect.innerHTML += `
                <option value="${route}">
                    ${route}
                </option>
            `;
        });
    }

    // Filter buses by route and operator
    function filterBuses() {
      const routeFilter = document.getElementById('routeFilter').value.toLowerCase();
      const operatorFilter = document.getElementById('operatorFilter').value.toLowerCase();
      
      console.log(`[FILTER] Applying filters - Route: "${routeFilter}", Operator: "${operatorFilter}"`);

      let visibleCount = 0;

      Object.keys(busData).forEach(busId => {
        const bus = busData[busId];
        const busEl = document.getElementById(`item-${busId}`);
        const marker = busMarkers[busId];

        const routeMatch = !routeFilter || (bus.route || '').toLowerCase() === routeFilter;
        const operatorMatch = !operatorFilter || (bus.name || '').toLowerCase().includes(operatorFilter);

        if (routeMatch && operatorMatch) {
          if (busEl) busEl.style.display = 'flex';
          if (marker) marker.setOpacity(1);
          visibleCount++;
        } else {
          if (busEl) busEl.style.display = 'none';
          if (marker) marker.setOpacity(0);
        }
      });

      console.log(`[FILTER] Complete. Visible count: ${visibleCount}`);
    }
    window.filterBuses = filterBuses;

    function renderBusSidebar(
        buses
    ) {

        const sidebar =
            document.getElementById(
                "bus-sidebar-list"
            );

        const routeFilter =
            document.getElementById(
                "routeFilter"
            );

        const operatorFilter =
            document.getElementById(
                "operatorFilter"
            );

        const route =
            routeFilter.value
                .trim()
                .toLowerCase();

        const operator =
            operatorFilter.value
                .trim()
                .toLowerCase();

        sidebar.innerHTML = "";

        const filtered =
            Object.entries(
                buses
            ).filter(
                ([busId, bus]) => {

                    const routeName =
                        (
                            bus.route ||
                            ""
                        ).toLowerCase();

                    const operatorName =
                        (
                            bus.operator ||
                            busId
                        ).toLowerCase();

                    const routeOk =
                        !route ||
                        route ===
                            "all routes" ||
                        routeName.includes(
                            route
                        );

                    const operatorOk =
                        !operator ||
                        operatorName.includes(
                            operator
                        );

                    return (
                        routeOk &&
                        operatorOk
                    );
                }
            );

        sidebar.style.display =
            "block";

        filtered.forEach(
            ([busId, bus]) => {
                const operatorName = bus.op || bus.operator || busId;
                const routeName = bus.route || "Dynamic Route";
                const busType = bus.type || "Standard";

                // Filter stops marked to show on card
                const stopsToShow = (bus.intermediateStops || bus.stopTimes || []).filter(stop => stop.showOnCard === true || stop.showOnCard === "true");
                let stopsHtml = "";
                if (stopsToShow.length > 0) {
                    stopsHtml = `
                    <div class="bus-card-stops" style="margin: 8px 0; padding: 8px 12px; background: #fafafb; border-left: 3px solid var(--accent); font-size: 11px; display: flex; flex-direction: column; gap: 6px; border-radius: 6px; border: 1px solid var(--border); border-top-left-radius: 0; border-bottom-left-radius: 0;">
                        ${stopsToShow.map(s => {
                            const stopTime = s.time || s.scheduledTime || "--:--";
                            return `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 4px;">
                                    <i class="fa-solid fa-map-pin" style="font-size: 9px; color: var(--accent);"></i> ${s.name}
                                </span>
                                <span style="font-weight: 700; color: var(--brand-gold);">${stopTime}</span>
                            </div>
                            `;
                        }).join('')}
                    </div>
                    `;
                }

                sidebar.innerHTML += `
                <div class="bus-item" id="item-${busId}" onclick="focusOnBus('${busId}')">
                    <div class="bus-item-header">
                        <span class="bus-item-op">${operatorName}</span>
                        <span class="bus-status live">
                            <span class="pulse-dot"></span> Live
                        </span>
                    </div>

                    <div class="bus-item-route">
                        <i class="fa-solid fa-route" style="color: var(--accent);"></i>
                        <span>${routeName}</span>
                    </div>

                    ${stopsHtml}

                    <div class="bus-item-footer">
                        <span class="bus-item-type" style="color: var(--accent);">
                            <i class="fa-solid fa-bus"></i> ${busType}
                        </span>
                        <span id="timer-${busId}">
                            updated 0s ago
                        </span>
                    </div>
                </div>
                `;
            }
        );
    }

    // Toggle stops collapse/expand
    function toggleStops(busId, event) {
      if (event) event.stopPropagation(); // prevent card click focus trigger
      const stopsList = document.getElementById(`stops-${busId}`);
      if (stopsList) {
        const isHidden = stopsList.style.display === "none";
        stopsList.style.display = isHidden ? "block" : "none";
        
        const toggleBtn = stopsList.previousElementSibling;
        const icon = toggleBtn.querySelector('i');
        if (icon) {
          icon.className = isHidden ? "fa-solid fa-chevron-up" : "fa-solid fa-chevron-down";
        }
      }
    }
    window.toggleStops = toggleStops;

    // Local timer updater to refresh the "X seconds ago" sidebar labels
    setInterval(() => {
      Object.keys(busData).forEach(busId => {
        const info = busData[busId];
        if (!info || !info.isLive) return;
        const ageSec = Math.max(0, Math.floor((Date.now() - info.lastSeen) / 1000));
        const timerEl = document.getElementById(`timer-${busId}`);
        if (timerEl) {
          timerEl.textContent = `updated ${ageSec}s ago`;
        }
      });
    }, 1000);
  </script>

  <!-- Mobile Navigation & Search Dropdown Script -->
  <script>
    // Custom Searchable Dropdown Class
    class SearchableDropdown {
      constructor(selectElement, placeholder = 'Search...') {
        if (!selectElement) return;
        this.select = selectElement;
        this.placeholder = placeholder;
        this.init();
      }
      
      init() {
        this.select.style.display = 'none';
        
        this.wrapper = document.createElement('div');
        this.wrapper.className = 'custom-dropdown';
        this.wrapper.style.position = 'relative';
        this.wrapper.style.width = '100%';
        
        this.toggle = document.createElement('div');
        this.toggle.className = 'custom-dropdown-toggle';
        this.toggle.style.cssText = 'display: flex; align-items: center; justify-content: space-between; min-height: 44px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 10px; background: white; cursor: pointer; font-size: 15px; user-select: none;';
        
        this.toggleText = document.createElement('span');
        this.toggleText.style.cssText = 'white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 20px); font-weight: 500;';
        
        const arrow = document.createElement('i');
        arrow.className = 'fa-solid fa-chevron-down';
        arrow.style.cssText = 'font-size: 12px; color: var(--text-secondary); transition: transform 0.2s;';
        this.arrow = arrow;
        
        this.toggle.appendChild(this.toggleText);
        this.toggle.appendChild(arrow);
        this.wrapper.appendChild(this.toggle);
        
        this.select.customDropdown = this;
        
        this.menu = document.createElement('div');
        this.menu.className = 'custom-dropdown-menu';
        this.menu.style.cssText = 'display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 10px; margin-top: 4px; box-shadow: var(--shadow-lg); z-index: 99999; max-height: 320px; overflow: hidden;';
        
        const searchWrapper = document.createElement('div');
        searchWrapper.style.padding = '8px';
        searchWrapper.style.borderBottom = '1px solid var(--border-soft)';
        
        this.searchInput = document.createElement('input');
        this.searchInput.type = 'text';
        this.searchInput.placeholder = this.placeholder;
        this.searchInput.style.cssText = 'width: 100%; min-height: 36px; padding: 6px 12px; border: 1px solid var(--border-soft); border-radius: 6px; font-size: 14px; outline: none;';
        searchWrapper.appendChild(this.searchInput);
        this.menu.appendChild(searchWrapper);
        
        this.optionsContainer = document.createElement('div');
        this.optionsContainer.style.cssText = 'overflow-y: auto; max-height: 260px;';
        this.menu.appendChild(this.optionsContainer);
        
        this.wrapper.appendChild(this.menu);
        this.select.parentNode.insertBefore(this.wrapper, this.select.nextSibling);
        
        this.toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          this.toggleMenu();
        });
        
        this.searchInput.addEventListener('input', () => this.filterOptions());
        this.searchInput.addEventListener('click', (e) => e.stopPropagation());
        
        document.addEventListener('click', () => this.closeMenu());
        
        this.updateToggleText();
        
        this.observer = new MutationObserver(() => this.populateOptions());
        this.observer.observe(this.select, { childList: true });
        
        this.populateOptions();

        this.select.addEventListener('change', () => {
          this.updateToggleText();
          this.populateOptions();
        });
      }
      
      toggleMenu() {
        const isOpen = this.menu.style.display === 'block';
        document.querySelectorAll('.custom-dropdown-menu').forEach(m => {
          if (m !== this.menu) m.style.display = 'none';
        });
        
        if (isOpen) {
          this.closeMenu();
        } else {
          this.menu.style.display = 'block';
          this.searchInput.value = '';
          this.filterOptions();
          setTimeout(() => this.searchInput.focus(), 50);
          this.arrow.style.transform = 'rotate(180deg)';
        }
      }
      
      closeMenu() {
        this.menu.style.display = 'none';
        if (this.arrow) this.arrow.style.transform = 'rotate(0deg)';
      }
      
      populateOptions() {
        this.optionsContainer.innerHTML = '';
        const options = Array.from(this.select.options);
        
        options.forEach(opt => {
          const optionDiv = document.createElement('div');
          optionDiv.className = 'dropdown-option';
          optionDiv.style.cssText = 'padding: 10px 16px; font-size: 14px; cursor: pointer; white-space: normal; word-break: break-word; color: var(--text-primary); transition: background 0.15s;';
          optionDiv.textContent = opt.textContent;
          
          if (opt.selected) {
            optionDiv.style.background = 'var(--brand-yellow-light)';
            optionDiv.style.fontWeight = '700';
          }
          
          optionDiv.addEventListener('click', () => {
            this.select.value = opt.value;
            this.select.dispatchEvent(new Event('change', { bubbles: true }));
            this.updateToggleText();
            this.closeMenu();
          });
          
          optionDiv.addEventListener('mouseenter', () => {
            optionDiv.style.background = '#f1f5f9';
          });
          optionDiv.addEventListener('mouseleave', () => {
            optionDiv.style.background = opt.selected ? 'var(--brand-yellow-light)' : 'transparent';
          });
          
          this.optionsContainer.appendChild(optionDiv);
        });
        
        this.updateToggleText();
      }
      
      filterOptions() {
        const val = this.searchInput.value.toLowerCase();
        const optionDivs = this.optionsContainer.querySelectorAll('.dropdown-option');
        const options = Array.from(this.select.options);
        
        optionDivs.forEach((div, i) => {
          if (!options[i]) return;
          const txt = options[i].textContent.toLowerCase();
          if (txt.includes(val)) {
            div.style.display = 'block';
          } else {
            div.style.display = 'none';
          }
        });
      }
      
      updateToggleText() {
        const selectedOpt = this.select.options[this.select.selectedIndex];
        this.toggleText.textContent = selectedOpt ? selectedOpt.textContent : 'Select option...';
      }
    }

    // Initialize custom searchable route dropdown filter
    document.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('routeFilter');
      if (el) {
        new SearchableDropdown(el);
      }
    });

    // Sidebar Toggle Function
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) {
        sidebar.classList.toggle('expanded');
        // Smooth transition layout invalidate Leaflet size
        setTimeout(() => {
          if (typeof map !== 'undefined' && map.invalidateSize) {
            map.invalidateSize();
          }
        }, 350);
      }
    }
    
    // Mobile Navigation Functions
    function toggleMobileNav() {
      const overlay = document.getElementById('mobileNavOverlay');
      const drawer = document.getElementById('mobileNavDrawer');
      const menuBtn = document.getElementById('mobileMenuBtn');
      overlay.classList.add('active');
      drawer.classList.add('active');
      document.body.style.overflow = 'hidden';
      if (menuBtn) {
        menuBtn.setAttribute('aria-expanded', 'true');
      }
      setTimeout(() => {
        const firstLink = drawer.querySelector('.mobile-nav-link');
        if (firstLink) firstLink.focus();
      }, 100);
    }

    function closeMobileNav() {
      const overlay = document.getElementById('mobileNavOverlay');
      const drawer = document.getElementById('mobileNavDrawer');
      const menuBtn = document.getElementById('mobileMenuBtn');
      overlay.classList.remove('active');
      drawer.classList.remove('active');
      document.body.style.overflow = '';
      if (menuBtn) {
        menuBtn.setAttribute('aria-expanded', 'false');
        menuBtn.focus();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const drawer = document.getElementById('mobileNavDrawer');
        if (drawer && drawer.classList.contains('active')) {
          closeMobileNav();
        }
      }
    });
  </script>
</body>
