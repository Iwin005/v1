<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg"/>
  <title>User Portal &mdash; Win Bus Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css" />
  <style>
    body {
      background: var(--bg-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
    }

    /* Crimson/Red Theme Overrides for User Portal */
    :root {
      --brand-red: #d84e55;
      --brand-red-hover: #c13e44;
      --brand-red-light: #fee2e2;
      --brand-red-soft: #f87171;
    }

    .login-card {
      background: var(--surface-white);
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      padding: var(--space-2xl) var(--space-xl);
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-soft);
      position: relative;
      z-index: 1;
    }
    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--brand-red), var(--brand-red-hover));
      border-radius: 28px 28px 0 0;
    }

    .login-logo {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    .login-logo h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
    }
    .login-logo h1 span { color: var(--brand-red); }
    .login-logo p {
      font-size: var(--font-body);
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Auth Mode Tabs */
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--border-soft);
      margin-bottom: var(--space-xl);
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      outline: none;
      transition: var(--transition);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .auth-tab.active {
      color: var(--brand-red);
      border-bottom-color: var(--brand-red);
    }

    .form-group {
      margin-bottom: var(--space-lg);
    }
    .form-group label {
      display: block;
      font-size: var(--font-meta);
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      color: var(--brand-red);
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      height: 48px;
      background: var(--surface-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 40px 0 38px;
      font-size: var(--font-body);
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }
    .input-wrap input:focus {
      border-color: var(--brand-red);
      box-shadow: 0 0 0 3px rgba(216, 78, 85, 0.15);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: var(--transition);
    }
    .toggle-pw:hover { color: var(--brand-red); }

    .btn-login {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, var(--brand-red) 0%, var(--brand-red-soft) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(216, 78, 85, 0.25);
    }
    .btn-login:hover  {
      background: linear-gradient(135deg, var(--brand-red-hover) 0%, var(--brand-red) 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(216, 78, 85, 0.4);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .error-msg {
      background: var(--danger-light);
      border: 1px solid var(--border);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: var(--space-md) var(--space-lg);
      font-size: var(--font-meta);
      margin-top: var(--space-lg);
      display: none;
      align-items: center;
      gap: var(--space-sm);
    }
    .error-msg.show { display: flex; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-xl);
      color: var(--text-muted);
      font-size: var(--font-body);
      text-decoration: none;
      transition: var(--transition);
    }
    .back-link:hover { color: var(--brand-red); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Initializing loader */
    .init-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .init-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .init-loader-content {
      text-align: center;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    .init-loader p {
      color: var(--text-muted);
      font-size: var(--font-body);
    }

    .login-card {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .login-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Initializing Loader -->
  <div class="init-loader" id="initLoader">
    <div class="init-loader-content">
      <img src="assets/logo.jpg" alt="WinBus Logo" style="width: 64px; height: 64px; border-radius: 50%; border: 2.5px solid var(--brand-red); object-fit: cover; margin-bottom: 16px; box-shadow: var(--shadow-md); animation: pulse 1.5s ease-in-out infinite;">
      <p id="initStatus">Connecting to server...</p>
    </div>
  </div>

  <div class="login-card" id="loginCard">

    <div class="login-logo">
      <img src="assets/logo.jpg" alt="WinBus Logo" style="width: 64px; height: 64px; border-radius: 50%; border: 2.5px solid var(--brand-red); object-fit: cover; margin-bottom: var(--space-md); box-shadow: 0 4px 12px rgba(216, 78, 85, 0.35);">
      <h1>Win<span>Bus</span> Tracker</h1>
      <p>Commuter &amp; User Portal</p>
    </div>

    <!-- Mode Selector Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="setMode('login')">Sign In</button>
      <button class="auth-tab" id="tabRegister" onclick="setMode('register')">Create Account</button>
    </div>

    <!-- Sign Up Name Group (Hidden by default in Login Mode) -->
    <div class="form-group" id="nameGroup" style="display: none;">
      <label>Full Name</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input id="name" type="text" placeholder="Enter your name" />
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input id="email" type="email" placeholder="user@winbus.in" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePwBtn" type="button" tabindex="-1">
          <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="submitBtn">
      <span id="btnText"><i class="fa-solid fa-right-to-bracket"></i> Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorText">Invalid credentials. Please try again.</span>
    </div>

    <a href="index.html" class="back-link">
      <i class="fa-solid fa-arrow-left" style="margin-right:5px"></i> Back to Bus Search
    </a>

  </div>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut,
      setPersistence, 
      browserLocalPersistence,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZXryu-NQ-Jv4hRRPCnmc8shKgLQPQP94",
      authDomain: "realtime-tracking-3809e.firebaseapp.com",
      databaseURL: "https://realtime-tracking-3809e-default-rtdb.firebaseio.com",
      projectId: "realtime-tracking-3809e",
      storageBucket: "realtime-tracking-3809e.firebasestorage.app",
      messagingSenderId: "1085653591220",
      appId: "1:1085653591220:web:5789826b047764c2ada3e1"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Elements
    const initLoader = document.getElementById('initLoader');
    const loginCard = document.getElementById('loginCard');
    const initStatus = document.getElementById('initStatus');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const nameInput = document.getElementById('name');
    const nameGroup = document.getElementById('nameGroup');
    const submitBtn = document.getElementById('submitBtn');
    const togglePwBtn = document.getElementById('togglePwBtn');
    const eyeIcon = document.getElementById('eyeIcon');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');

    // State Variables
    let currentMode = 'login'; // 'login' or 'register'
    let redirectUrl = 'index.html';

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    if (params.has('redirect')) {
      redirectUrl = params.get('redirect');
    }
    
    // Check if logout action requested
    if (params.get('action') === 'logout') {
      initStatus.textContent = 'Logging out...';
      signOut(auth).then(() => {
        localStorage.removeItem('win_user_logged_in');
        localStorage.removeItem('win_user_name');
        window.location.replace('index.html');
      }).catch(err => {
        console.error('Logout error:', err);
        window.location.replace('index.html');
      });
    } else {
      initStatus.textContent = 'Checking user authentication...';
      
      // Auth Guard state listener
      let initialCheck = true;
      onAuthStateChanged(auth, async (user) => {
        if (initialCheck) {
          initialCheck = false;
          if (user) {
            localStorage.setItem('win_user_logged_in', 'true');
            
            // Try fetching from Realtime Database first, fallback to displayName or email prefix
            let userName = user.displayName || user.email.split('@')[0];
            try {
              const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
              const db = getDatabase(app);
              const snap = await get(ref(db, `users/${user.uid}`));
              if (snap.exists() && snap.val() && snap.val().name) {
                userName = snap.val().name;
              }
            } catch (dbErr) {
              console.error("Failed to fetch user name in onAuthStateChanged:", dbErr);
            }
            
            localStorage.setItem('win_user_name', userName);
            window.location.replace(redirectUrl);
          } else {
            localStorage.removeItem('win_user_logged_in');
            localStorage.removeItem('win_user_name');
            initLoader.classList.add('hidden');
            loginCard.classList.add('visible');
          }
        }
      });
    }

    // Toggle Sign In vs Create Account tabs
    window.setMode = function(mode) {
      currentMode = mode;
      errorMsg.classList.remove('show');
      
      if (mode === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        nameGroup.style.display = 'none';
        btnText.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        nameGroup.style.display = 'block';
        btnText.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
      }
    };

    // Password view/hide toggle
    togglePwBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'fa-solid fa-eye-slash';
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'fa-solid fa-eye';
      }
    });

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      btnText.style.display = isLoading ? 'none' : 'flex';
      spinner.style.display = isLoading ? 'block' : 'none';
    }

    function showError(message) {
      errorText.textContent = message;
      errorMsg.classList.add('show');
    }

    async function handleAuthAction() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const name = nameInput.value.trim();

      errorMsg.classList.remove('show');

      if (!email) { showError('Please enter your email.'); return; }
      if (!password) { showError('Please enter your password.'); return; }
      if (currentMode === 'register' && !name) { showError('Please enter your name.'); return; }

      setLoading(true);

      try {
        await setPersistence(auth, browserLocalPersistence);

        if (currentMode === 'login') {
          const userCred = await signInWithEmailAndPassword(auth, email, password);
          localStorage.setItem('win_user_logged_in', 'true');
          
          let userName = userCred.user.displayName || userCred.user.email.split('@')[0];
          try {
            const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
            const db = getDatabase(app);
            const snap = await get(ref(db, `users/${userCred.user.uid}`));
            if (snap.exists() && snap.val() && snap.val().name) {
              userName = snap.val().name;
            }
          } catch (dbErr) {
            console.error("Failed to fetch user name from database on login:", dbErr);
          }
          localStorage.setItem('win_user_name', userName);
        } else {
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          try {
            const { updateProfile } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
            await updateProfile(userCred.user, { displayName: name });
          } catch (profileErr) {
            console.error("Failed to update profile display name:", profileErr);
          }
          
          // Save to Realtime Database
          try {
            const { getDatabase, ref, set } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
            const db = getDatabase(app);
            await set(ref(db, `users/${userCred.user.uid}`), { name: name, email: email });
          } catch (dbErr) {
            console.error("Failed to save user name to database on registration:", dbErr);
          }
          
          localStorage.setItem('win_user_logged_in', 'true');
          localStorage.setItem('win_user_name', name);
        }
        
        window.location.replace(redirectUrl);
      } catch (error) {
        setLoading(false);
        let msg = 'Authentication failed. Please check details.';
        if (error.code === 'auth/email-already-in-use') msg = 'Email is already registered. Please sign in.';
        else if (error.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
        else if (error.code === 'auth/weak-password') msg = 'Password should be at least 6 characters.';
        else if (error.code === 'auth/invalid-email') msg = 'Please enter a valid email.';
        
        showError(msg);
      }
    }

    submitBtn.addEventListener('click', handleAuthAction);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAuthAction();
    });
  </script>
</body>
</html>
